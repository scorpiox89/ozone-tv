name: Refresh Instagram feed
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch latest posts
        env:
          IG_ACCOUNTS: ${{ secrets.IG_ACCOUNTS }}
          DAYS_WINDOW: "90"
          MAX_POSTS:   "200"
        run: node fetch.mjs
      - name: Commit posts.json if it changed
        run: |
          git config user.name  "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add posts.json
          git commit -m "Refresh Instagram posts" || echo "no changes"
          git push
