<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ozone FC — Instagram Wall</title>
<style>
  /* ============================================================
     OZONE FC — INSTAGRAM TV WALL
     ------------------------------------------------------------
     Shows a scattered collage of your latest Instagram posts.
     - 10 random posts per screen, from the last 90 days
     - rotates to 10 more every 15 seconds
     - true aspect ratio (no cropping), videos autoplay muted
     - random position / random size / some faded (background),
       some sharp (foreground)
     - each tile shows only the @handle + how long ago it posted
     ============================================================ */

  :root {
    /* ---- Ozone FC corporate colours ---- */
    --lime:      #abcf3e;            /* R171 G207 B62  */
    --charcoal:  #35373b;            /* R53  G55  B59  */
    --wall:      #303236;            /* slightly darker charcoal for the wall */
    --card:      #1d1e20;            /* badges + #ozonefc card */
    --badge-bg:  rgba(20,21,23,0.90);
    --text:      #ffffff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#000;             /* letterbox bars around the 16:9 screen */
    overflow:hidden;
    font-family:'Helvetica Neue', Arial, sans-serif;
    cursor:none;                 /* hide cursor on TV */
    -webkit-font-smoothing:antialiased;
  }

  /* centre a fixed 16:9 screen inside the viewport (true TV ratio) */
  #frame {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  #screen {
    position:relative;
    aspect-ratio:16 / 9;
    width:min(100vw, 177.78vh);  /* 16/9 of viewport height */
    overflow:hidden;
    background:var(--wall);
  }

  /* honeycomb hexagon texture, like the reference */
  #wall {
    position:absolute; inset:0;
    background-color:var(--wall);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='27.71' height='48' viewBox='0 0 27.71 48'><g fill='none' stroke='%23ffffff' stroke-opacity='0.05' stroke-width='1'><path d='M13.86 -16L27.71 -8L27.71 8L13.86 16L0 8L0 -8Z'/><path d='M0 8L13.86 16L13.86 32L0 40L-13.86 32L-13.86 16Z'/><path d='M27.71 8L41.57 16L41.57 32L27.71 40L13.86 32L13.86 16Z'/><path d='M13.86 32L27.71 40L27.71 56L13.86 64L0 56L0 40Z'/></g></svg>");
    background-size:38px 66px;          /* honeycomb scale */
  }

  /* one rotating screen of tiles */
  .stage {
    position:absolute; inset:0;
    opacity:0;
    transition:opacity 1.1s ease;
  }
  .stage.in { opacity:1; }

  /* anchor — NOT clipped, so the badge can spill past the image edge */
  .tile {
    position:absolute;
    transform:scale(0.97);
    opacity:0;
    animation:pop 0.9s ease forwards;
  }
  @keyframes pop { to { opacity:1; transform:scale(1); } }

  /* the image/video box — sharp corners, flat, like the mockups */
  .tile .media {
    position:relative;
    width:100%; height:100%;
    overflow:hidden;
    background:#111;
  }
  .tile .media img, .tile .media video {
    display:block;
    width:100%; height:100%;
    object-fit:cover;            /* box already matches media aspect ratio */
  }

  /* recessed background tiles: dark image, but the label stays readable */
  .tile.bg .media img, .tile.bg .media video { filter:brightness(0.62); }
  .tile.bg .media::after {
    content:""; position:absolute; inset:0;
    background:rgba(28,30,33,0.40);
  }

  /* @handle + time-ago rendered as TWO detached dark chips, like the mockups:
     [IG @ozonefc.uz] on the image's bottom-left, and a separate [Xw / ago]
     box floating to its right in the dark gap. */
  /* the whole badge is sized in em; its font-size is set per tile in JS so the
     caption + date boxes scale with the post they belong to */
  .badge {
    position:absolute;
    left:0; bottom:6%;
    display:flex; align-items:stretch;
    gap:0.32em;                       /* fixed gap → the two chips never drift apart */
    background:transparent;
    pointer-events:none;
    font-size:14px;                   /* overridden inline, relative to post size */
  }
  .badge .chip {
    background:var(--badge-bg);
    display:flex; align-items:center;
    padding:0.5em 0.72em;
  }
  .badge .handle-chip svg { width:1.4em; height:1.4em; flex:none; }
  .badge .handle-chip .handle {
    color:var(--text); font-weight:800;
    font-size:1em; white-space:nowrap; letter-spacing:0.2px; margin-left:0.55em;
  }
  .badge .time-chip {
    flex-direction:column; align-items:flex-end; justify-content:center;
    line-height:1.0;
  }
  .badge .time-chip .n {
    color:var(--text); font-weight:700;
    font-size:1em; white-space:nowrap;
  }
  .badge .time-chip .u {
    color:var(--text); font-weight:400;
    font-size:0.72em; opacity:0.85; margin-top:0.15em;
  }

  /* logo box */
  .hashcard {
    position:absolute;
    border:1px solid var(--lime);     /* slim frame */
    background-color:var(--card);
    /* same honeycomb as the wall (pattern taken from the background) */
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='27.71' height='48' viewBox='0 0 27.71 48'><g fill='none' stroke='%23ffffff' stroke-opacity='0.06' stroke-width='1'><path d='M13.86 -16L27.71 -8L27.71 8L13.86 16L0 8L0 -8Z'/><path d='M0 8L13.86 16L13.86 32L0 40L-13.86 32L-13.86 16Z'/><path d='M27.71 8L41.57 16L41.57 32L27.71 40L13.86 32L13.86 16Z'/><path d='M13.86 32L27.71 40L27.71 56L13.86 64L0 56L0 40Z'/></g></svg>");
    background-size:38px 66px;
    /* space-evenly makes the gap above the logo, between logo & motto,
       and below the motto all identical */
    display:flex; flex-direction:column; align-items:center; justify-content:space-evenly;
    padding:0 22px;
    z-index:60;
    box-shadow:0 0 25px rgba(0,0,0,0.55);   /* x:0 y:0 blur:25 — static, no fade */
  }
  /* motto inside the box — ITC Avant Garde Gothic Pro Demi, all lowercase.
     Drop the font file (named AvantGarde-Demi.*) next to index.html and it
     is used automatically; until then a close geometric fallback shows. */
  @font-face {
    font-family:'ITC Avant Garde Gothic Pro';
    src:url('AvantGarde-Demi.woff2') format('woff2'),
        url('AvantGarde-Demi.woff')  format('woff'),
        url('AvantGarde-Demi.otf')   format('opentype'),
        url('AvantGarde-Demi.ttf')   format('truetype');
    font-weight:600; font-style:normal; font-display:swap;
  }
  .hashcard .motto {
    display:inline-block;
    font-family:'ITC Avant Garde Gothic Pro','Century Gothic','Futura',sans-serif;
    font-weight:600;
    text-transform:lowercase;
    color:#fff;
    letter-spacing:0.3px;
    line-height:1;
    white-space:nowrap;
    font-size:clamp(13px, 1.5vw, 32px);   /* tagline under the logo */
  }
  /* logo at the top of the box */
  .hashcard .logo-img {
    display:block;
    width:82%; height:auto;          /* explicit width → always large */
    max-height:46%;
  }
  /* wordmark fallback if the logo image fails to load */
  .hashcard .logo {
    font-weight:800; letter-spacing:-1px;
    font-size:clamp(24px, 2.6vw, 52px); line-height:1; color:#fff;
  }
  .hashcard .logo .o,
  .hashcard .logo .fc { color:var(--lime); }

  /* tiny status note (only while loading / on error) */
  #status {
    position:fixed; left:50%; top:50%;
    transform:translate(-50%,-50%);
    color:#888; font-size:18px; letter-spacing:0.5px;
    text-align:center; z-index:200;
  }
</style>
</head>
<body>
  <div id="frame">
    <div id="screen">
      <div id="wall"></div>
      <div id="status">Loading feed…</div>
    </div>
  </div>

<script>
/* =====================================================================
   1) CONFIG  —  the only part you normally need to touch
   ===================================================================== */
const CONFIG = {
  // PRIMARY source: a posts.json produced by the Instagram Graph API fetcher
  // (see fetch.mjs). This is the free, unlimited path — 60+ posts, refreshed
  // on a schedule. If it isn't there yet, the wall falls back to Behold, then demo.
  POSTS_JSON:        "posts.json",

  // FALLBACK: a Behold.so JSON feed URL (free tier caps at 6 posts).
  BEHOLD_FEED_URL:   "https://feeds.behold.so/9WCiXVTytew6QoPMXAJK",

  HANDLE:            "@ozonefc.uz", // shown on every tile
  POSTS_PER_SCREEN:  10,            // tiles per rotation
  ROTATE_MS:         15000,         // change screen every 15s
  DAYS_WINDOW:       90,            // only posts from the last N days
  REFRESH_MIN:       60,            // re-pull the feed every N minutes (fresh posts + URLs)
  SHOW_LOGO_CARD:    true,          // show the lime-bordered box on the right
  LOGO_URL:          "logo.png",    // logo shown at the top of the box
  MOTTO:             "atmosphere for you",  // motto at the bottom (ITC Avant Garde, lowercase)
};

/* =====================================================================
   2) DATA — fetch from Behold, normalise, filter to last 90 days
   ===================================================================== */
const IG_SVG = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" stroke="white" stroke-width="1.8"/>
  <circle cx="12" cy="12" r="4.3" stroke="white" stroke-width="1.8"/>
  <circle cx="17.4" cy="6.6" r="1.3" fill="white"/></svg>`;

async function loadPosts() {
  // 1) self-hosted posts.json (Instagram Graph API fetcher) — the unlimited path
  if (CONFIG.POSTS_JSON) {
    const p = await tryFeed(CONFIG.POSTS_JSON);
    if (p && p.length) return p;
  }
  // 2) Behold feed (free tier = 6 posts)
  if (CONFIG.BEHOLD_FEED_URL) {
    const p = await tryFeed(CONFIG.BEHOLD_FEED_URL);
    if (p && p.length) return p;
  }
  // 3) demo images
  return demoPosts();
}

async function tryFeed(url) {
  try {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) return null;
    const data = await res.json();
    const raw  = Array.isArray(data) ? data : (data.posts || []);
    const handle = data?.username ? "@" + data.username : CONFIG.HANDLE;

    const posts  = raw.map(p => normalise(p, handle)).filter(Boolean);
    const cutoff = Date.now() - CONFIG.DAYS_WINDOW * 86400000;
    const recent = posts.filter(p => p.time >= cutoff);
    return recent.length ? recent : posts;     // fall back to all if none in window
  } catch (e) {
    console.error("Feed load failed:", url, e);
    return null;
  }
}

// Map a Behold post object to the shape this wall uses
function normalise(p, handle) {
  const isVideo = (p.mediaType || p.media_type) === "VIDEO";
  const url     = p.mediaUrl || p.media_url;
  if (!url) return null;

  // best available aspect ratio from Behold "sizes", else fall back
  let w = 0, h = 0;
  const s = p.sizes || {};
  const pick = s.full || s.large || s.medium || s.small;
  if (pick?.width && pick?.height) { w = pick.width; h = pick.height; }
  else if (p.width && p.height)    { w = p.width;    h = p.height;    }

  return {
    type:   isVideo ? "video" : "image",
    src:    url,
    poster: p.thumbnailUrl || p.thumbnail_url || "",
    time:   new Date(p.timestamp || p.time || Date.now()).getTime(),
    handle: p.username ? "@" + p.username : (handle || CONFIG.HANDLE),  // per-post handle
    aspect: (w && h) ? w / h : (isVideo ? 9/16 : 1), // w/h
  };
}

// Sample data so the wall runs before Behold is connected.
// Portrait-dominant (reels / stories) to match the real feed look.
function demoPosts() {
  document.getElementById("status").textContent = "DEMO MODE — add your Behold feed URL";
  const now = Date.now(), D = 86400000;
  const imgs = [
    [1011,9/16],[1043,4/5],[1062,9/16],[1027,9/16],[1074,4/5],
    [1080,9/16],[1059,9/16],[1084,4/5],[1006,9/16],[1039,9/16],
    [1050,4/5],[1024,9/16],[1015,9/16],[103,4/5],[1042,9/16],
  ];
  return imgs.map((m,i) => {
    const h = 1000, w = Math.round(h * m[1]);
    return {
      type:"image",
      src:`https://picsum.photos/id/${m[0]}/${w}/${h}`,
      poster:"", time: now - (i*6+2)*D,
      handle: CONFIG.HANDLE, aspect: m[1],
    };
  });
}

/* =====================================================================
   3) HELPERS
   ===================================================================== */
function timeAgo(ms) {
  const days = Math.floor((Date.now() - ms) / 86400000);
  if (days < 1)  return { n: "today", u: "" };
  if (days < 7)  return { n: days + "d", u: "ago" };
  const w = Math.floor(days / 7);
  return { n: w + "w", u: "ago" };
}
function shuffle(a) {
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const rand = (min, max) => min + Math.random() * (max - min);

// fixed layout grid, so the static logo box always lines up with the cells
const GRID = { COLS: 6, ROWS: 3 };
const LOGO_CELL = { c: GRID.COLS - 2, r: 1, w: 2, h: 1 };   // 2-wide block, mid-right

/* =====================================================================
   4) LAYOUT — scatter tiles over a jittered grid so they spread out
      but still overlap & vary like the mockups
   ===================================================================== */
function buildStage(posts) {
  const screen = document.getElementById("screen");
  const W = screen.clientWidth, H = screen.clientHeight;
  const stage = document.createElement("div");
  stage.className = "stage";

  /* ---- spanning grid (varied sizes, no overlap) -------------------
     A COLS x ROWS occupancy grid. Most posts take one cell; a few take
     a 2x2 / 1x2 block so some come out much larger, like the mockups.
     The logo box permanently owns a 2-cell block (mid-right).         */
  const { COLS, ROWS } = GRID;
  const cellW = W / COLS, cellH = H / ROWS;

  const occ = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  for (let dr = 0; dr < LOGO_CELL.h; dr++)
    for (let dc = 0; dc < LOGO_CELL.w; dc++)
      occ[LOGO_CELL.r + dr][LOGO_CELL.c + dc] = true;     // reserve the logo block

  const freeSpots = (sw, sh) => {
    const out = [];
    for (let r = 0; r + sh <= ROWS; r++)
      for (let c = 0; c + sw <= COLS; c++) {
        let ok = true;
        for (let dr = 0; dr < sh && ok; dr++)
          for (let dc = 0; dc < sw; dc++) if (occ[r + dr][c + dc]) { ok = false; break; }
        if (ok) out.push({ r, c });
      }
    return out;
  };
  const take = (r, c, sw, sh) => {
    for (let dr = 0; dr < sh; dr++) for (let dc = 0; dc < sw; dc++) occ[r + dr][c + dc] = true;
  };

  // size recipe: a couple of large / tall feature tiles, the rest single-cell
  const capacity = COLS * ROWS - LOGO_CELL.w * LOGO_CELL.h;
  const n = Math.min(posts.length, capacity);
  // consistent feature set each slide (less random): one large + two tall, rest single
  const spans = [[2,2],[1,2],[1,2]];
  while (spans.length < n) spans.push([1,1]);
  spans.length = n;

  // place feature tiles first so they fit; pick a random valid spot for variety
  const placed = [];
  for (let i = 0; i < n; i++) {
    let [sw, sh] = spans[i];
    let spots = freeSpots(sw, sh);
    if (!spots.length) { sw = 1; sh = 1; spots = freeSpots(1, 1); }   // downgrade if it won't fit
    if (!spots.length) break;                                        // grid full
    const s = spots[(Math.random() * spots.length) | 0];
    take(s.r, s.c, sw, sh);
    placed.push({ post: posts[i], r: s.r, c: s.c, sw, sh });
  }

  // recessed (dim) tiles — prefer ones touching the outer columns
  const edgeIdx = placed.map((_, i) => i).filter(i => placed[i].c === 0 || placed[i].c + placed[i].sw === COLS);
  const bgSet = new Set(shuffle(edgeIdx.length ? edgeIdx : placed.map((_, i) => i)).slice(0, 2));
  // foreground tiles that bleed off the top/bottom (must touch that edge)
  const edgeY = placed.map((_, i) => i).filter(i => !bgSet.has(i) && (placed[i].r === 0 || placed[i].r + placed[i].sh === ROWS));
  const bleedSet = new Set(shuffle(edgeY).slice(0, 2));

  placed.forEach((pl, i) => {
    const { post, r, c, sw, sh } = pl;
    const isBg = bgSet.has(i);
    const tile = document.createElement("div");
    tile.className = "tile" + (isBg ? " bg" : "");
    tile.style.zIndex = isBg ? "2" : "10";
    tile.style.animationDelay = (i * 0.05) + "s";

    // media wrapper (sharp corners, clipped)
    const mbox = document.createElement("div");
    mbox.className = "media";
    let media;
    if (post.type === "video") {
      media = document.createElement("video");
      media.src = post.src;
      if (post.poster) media.poster = post.poster;
      media.muted = true; media.loop = true;
      media.autoplay = true; media.playsInline = true;
      media.setAttribute("playsinline", "");
      media.play?.().catch(()=>{});
    } else {
      media = document.createElement("img");
      media.src = post.src;
      media.loading = "eager";
    }
    mbox.appendChild(media);
    tile.appendChild(mbox);

    // labels: handle chip + time chip, kept together so they never split
    const ago = timeAgo(post.time);
    const badge = document.createElement("div");
    badge.className = "badge";
    badge.innerHTML =
      `<span class="chip handle-chip">${IG_SVG}<span class="handle">${post.handle}</span></span>` +
      `<span class="chip time-chip"><span class="n">${ago.n}</span>${ago.u ? `<span class="u">${ago.u}</span>` : ""}</span>`;
    tile.appendChild(badge);

    // the block this tile occupies, then fit the media to its TRUE aspect ratio
    const bx = c * cellW, by = r * cellH, bw = sw * cellW, bh = sh * cellH;
    const pad    = isBg ? 0.98 : 0.90;     // consistent gap → structured, less random
    const touchL = c === 0, touchR = c + sw === COLS;
    const bX = isBg ? (touchL ? rand(0.12, 0.26) : touchR ? rand(0.72, 0.88) : 0) : 0;
    const bY = bleedSet.has(i) ? (r === 0 ? rand(0.10, 0.22) : rand(0.78, 0.92)) : 0;

    function fit(aspect) {
      let tw = bw * pad, th = tw / aspect;
      if (th > bh * pad) { th = bh * pad; tw = th * aspect; }

      let left;
      if (isBg && touchL)      left = -tw * bX;                          // bleed off left
      else if (isBg && touchR) left =  W - tw * bX;                      // bleed off right
      else  left = Math.max(0, Math.min(bx + (bw - tw) / 2, W - tw));    // centred in block

      let top;
      if (bY) top = (r === 0) ? -th * bY : H - th * bY;                  // bleed off top/bottom
      else    top = Math.max(0, Math.min(by + (bh - th) / 2, H - th));   // centred in block

      tile.style.width  = tw + "px";
      tile.style.height = th + "px";
      tile.style.left   = left + "px";
      tile.style.top    = top + "px";
      // caption + date boxes scale with the post size
      badge.style.fontSize = Math.max(8, Math.min(tw * 0.085, 22)) + "px";
    }
    fit(post.aspect);

    // correct to the media's true aspect ratio once it loads (so nothing crops)
    const onMeta = () => {
      const aw = media.naturalWidth  || media.videoWidth;
      const ah = media.naturalHeight || media.videoHeight;
      if (aw && ah) fit(aw / ah);
    };
    media.addEventListener(post.type === "video" ? "loadedmetadata" : "load", onMeta);

    stage.appendChild(tile);
  });

  return stage;
}

/* The logo box is a PERSISTENT element (created once) so it never fades or
   rebuilds when the slides change — it sits above the rotating stages. */
let logoBox = null;
function ensureLogoBox() {
  if (logoBox || !CONFIG.SHOW_LOGO_CARD) return;
  const card = document.createElement("div");
  card.className = "hashcard";

  // logo on top (wordmark fallback if the image is missing)
  if (CONFIG.LOGO_URL) {
    const img = document.createElement("img");
    img.className = "logo-img";
    img.src = CONFIG.LOGO_URL; img.alt = "logo";
    img.onerror = () => {
      img.remove();
      const wm = document.createElement("span");
      wm.className = "logo";
      wm.innerHTML = `<span class="o">o</span>zone<span class="fc">fc</span>`;
      card.insertBefore(wm, card.firstChild);
      syncBoxWidths();
    };
    img.addEventListener("load", syncBoxWidths);
    card.appendChild(img);
  }
  // motto at the bottom
  const motto = document.createElement("span");
  motto.className = "motto";
  motto.textContent = CONFIG.MOTTO;
  card.appendChild(motto);

  document.getElementById("screen").appendChild(card);
  logoBox = card;
}
function placeLogoBox() {
  if (!logoBox) return;
  const screen = document.getElementById("screen");
  const W = screen.clientWidth, H = screen.clientHeight;
  const cellW = W / GRID.COLS, cellH = H / GRID.ROWS;
  const bx = LOGO_CELL.c * cellW, by = LOGO_CELL.r * cellH;
  const bw = LOGO_CELL.w * cellW, bh = LOGO_CELL.h * cellH;
  const cw = bw * 0.82, ch = Math.min(bh * 0.84, cw * 0.46);   // tighter so logo + motto fill it
  logoBox.style.width  = cw + "px";
  logoBox.style.height = ch + "px";
  logoBox.style.left   = (bx + (bw - cw) / 2) + "px";
  logoBox.style.top    = (by + (bh - ch) / 2) + "px";
  syncBoxWidths();
}

// make the motto the SAME WIDTH as the logo (scale its font, no distortion)
function syncBoxWidths() {
  if (!logoBox) return;
  const logo  = logoBox.querySelector(".logo-img, .logo");
  const motto = logoBox.querySelector(".motto");
  if (!logo || !motto) return;
  const T = logo.getBoundingClientRect().width;     // logo's rendered width
  if (T <= 0) return;                               // image not loaded yet
  motto.style.fontSize = "";                        // reset to CSS size
  const natW    = motto.getBoundingClientRect().width;
  const natFont = parseFloat(getComputedStyle(motto).fontSize) || 16;
  if (natW > 0) motto.style.fontSize = (natFont * T / natW) + "px";
}

/* =====================================================================
   5) ROTATION LOOP
   ===================================================================== */
let ALL = [], cursor = 0, current = null;

function nextScreen() {
  if (!ALL.length) return;
  // take the next POSTS_PER_SCREEN, wrapping around; reshuffle on each wrap
  if (cursor === 0) ALL = shuffle(ALL);
  // never show more than the feed has, so a screen never repeats a post
  const n = Math.min(CONFIG.POSTS_PER_SCREEN, ALL.length);
  const slice = [];
  for (let k = 0; k < n; k++) {
    slice.push(ALL[cursor % ALL.length]);
    cursor++;
  }
  if (cursor >= ALL.length) cursor = 0;

  const wall  = document.getElementById("wall");
  const stage = buildStage(slice);
  wall.appendChild(stage);
  requestAnimationFrame(() => stage.classList.add("in"));

  // fade & remove the previous screen
  const prev = current;
  current = stage;
  if (prev) {
    prev.classList.remove("in");
    setTimeout(() => prev.remove(), 1200);
  }
}

async function refreshPool() {
  const p = await loadPosts();
  if (p && p.length) ALL = p;          // swap in fresh posts + non-expired media URLs
}

async function start() {
  await refreshPool();
  const status = document.getElementById("status");
  setTimeout(() => status && status.remove(), 3000);

  if (!ALL.length) { if (status) status.textContent = "No posts found."; return; }
  ensureLogoBox();
  placeLogoBox();
  nextScreen();
  setInterval(nextScreen, CONFIG.ROTATE_MS);
  if (CONFIG.REFRESH_MIN) setInterval(refreshPool, CONFIG.REFRESH_MIN * 60000);
}

// rebuild current screen on resize so it always fills the TV
let rT;
window.addEventListener("resize", () => {
  clearTimeout(rT);
  rT = setTimeout(() => { placeLogoBox(); if (current) { cursor = Math.max(0, cursor - CONFIG.POSTS_PER_SCREEN); nextScreen(); } }, 400);
});

start();
</script>
</body>
